name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # `release-please` cuts a GitHub release on merge of the bumper PR.
      # GITHUB_TOKEN-authored releases do NOT fire `release: created`, so we
      # dispatch the downstream npm publish workflow explicitly.
      - name: Trigger npm publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-npm.yml --repo "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"
