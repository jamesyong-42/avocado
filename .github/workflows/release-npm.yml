name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish @vibecook/avocado-sdk and @vibecook/avocado
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC provenance

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          # setup-node's `registry-url` writes an .npmrc that triggers npm's
          # OIDC auth flow when NODE_AUTH_TOKEN is unset AND `id-token: write`
          # is granted above. Without this, npm never attempts OIDC → ENEEDAUTH.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm -C packages/sdk run build

      - name: Build CLI
        run: pnpm -C packages/cli run build

      # Use `pnpm publish`, not `npm publish`, so that `workspace:*`
      # dependency specifiers get rewritten to concrete version ranges in
      # the published package.json.
      # `pnpm -C <dir> publish <flags>` mangles the flags when passed through
      # to `npm publish` (EUSAGE). Use `working-directory` + bare `pnpm publish`
      # instead.
      # SDK has no workspace:* deps, so plain npm publish works. Doing this
      # to rule out any pnpm-vs-npm OIDC token forwarding quirks.
      - name: Publish @vibecook/avocado-sdk
        working-directory: packages/sdk
        run: npm publish --provenance --access public --registry https://registry.npmjs.org

      - name: Wait for @vibecook/avocado-sdk to be indexed
        run: sleep 30

      - name: Publish @vibecook/avocado
        working-directory: packages/cli
        run: pnpm publish --provenance --access public --registry https://registry.npmjs.org --no-git-checks
