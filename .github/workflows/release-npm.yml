name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish @vibecook/avocado-sdk and @vibecook/avocado
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC provenance

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          # setup-node's `registry-url` writes an .npmrc that triggers npm's
          # OIDC auth flow when NODE_AUTH_TOKEN is unset AND `id-token: write`
          # is granted above. Without this, npm never attempts OIDC → ENEEDAUTH.

      # npm trusted publishing currently requires npm CLI 11.5.1+.
      # Node 22 on GitHub-hosted runners currently ships npm 10.x, so upgrade it.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Print publish toolchain
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm -C packages/sdk run build

      - name: Build CLI
        run: pnpm -C packages/cli run build

      - name: Print OIDC claims for npm
        run: |
          response="$(curl -sSfL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          token="$(printf '%s' "$response" | jq -r '.value')"
          payload="$(printf '%s' "$token" | cut -d '.' -f2 | tr '_-' '/+' | base64 -d 2>/dev/null)"
          printf '%s' "$payload" | jq '{aud, sub, repository, repository_owner, ref, sha, job_workflow_ref, workflow_ref, environment}'

      # SDK has no workspace:* deps, so plain npm publish works.
      - name: Publish @vibecook/avocado-sdk
        working-directory: packages/sdk
        run: npm publish --provenance --access public --registry https://registry.npmjs.org

      - name: Wait for @vibecook/avocado-sdk to be indexed
        run: sleep 30

      # Pack with pnpm so workspace:* references are rewritten, then publish
      # the generated tarball with npm so authentication stays on npm's OIDC path.
      - name: Pack @vibecook/avocado
        working-directory: packages/cli
        run: pnpm pack --pack-destination .

      - name: Publish @vibecook/avocado
        working-directory: packages/cli
        run: npm publish vibecook-avocado-*.tgz --provenance --access public --registry https://registry.npmjs.org
